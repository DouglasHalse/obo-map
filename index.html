<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ÖBO Parkeringskarta — Lediga bilplatser i Örebro</title>
    <meta name="description" content="Karta över lediga bilplatser hos Örebrobostäder (ÖBO). Hitta p-platser, garage och elbilsladdare i Örebro.">
    <meta property="og:title" content="ÖBO Parkeringskarta">
    <meta property="og:description" content="Hitta lediga bilplatser i Örebro — karta med priser, typ och tillgänglighet.">
    <meta property="og:type" content="website">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <!-- App CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🅿️</text></svg>">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <header class="sidebar-header">
                <h1>🅿️ ÖBO Parkeringskarta</h1>
                <p class="subtitle">Lediga bilplatser i Örebro</p>
            </header>

            <div id="filters"></div>
            <div id="stats"></div>
            <div id="resultsList"></div>
        </aside>

        <!-- Map -->
        <main id="map"></main>

        <!-- Mobile filter toggle -->
        <button id="filterToggle" aria-label="Filter" title="Filter">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
            </svg>
        </button>

        <!-- Loading overlay -->
        <div id="loading">
            <div class="spinner"></div>
            <p>Laddar parkeringsdata...</p>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <!-- App JS -->
    <script src="js/utils.js"></script>
    <script src="js/map.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
