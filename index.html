<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ÖBO Housing & Parking — Available listings in Örebro</title>
    <meta name="description" content="Map of available housing, parking and storage units from Örebrobostäder (ÖBO).">
    <meta property="og:title" content="ÖBO Housing & Parking">
    <meta property="og:description" content="Find available housing and parking in Örebro — map with prices, type and availability.">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol@0.79.0/dist/L.Control.Locate.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
    <script data-goatcounter="https://halse.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <header class="sidebar-header">
                <div class="header-top">
                    <h1 id="mapTitle">🏠 ÖBO Housing & Parking</h1>
                    <button id="langToggle" class="lang-toggle" aria-label="Switch language">SV</button>
                </div>
                <p id="subtitle" class="subtitle">Available listings in Örebro</p>
            </header>

            <nav id="categoryTabs" class="category-tabs"></nav>

            <div id="filters"></div>
            <div id="stats"></div>
            <div id="resultsList"></div>
        </aside>

        <main id="map"></main>

        <button id="filterToggle" aria-label="Filters" title="Filters">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
            </svg>
        </button>

        <div id="loading">
            <div class="spinner"></div>
            <p id="loadingText">Loading data...</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/leaflet.locatecontrol@0.79.0/dist/L.Control.Locate.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/map.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
